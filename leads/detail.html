<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lead Detail — TravelCRM</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<nav id="topnav"><button class="hamburger" onclick="toggleSidebar()">☰</button></nav>
<div class="app-layout">
  <nav id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div><h1 id="leadName">Lead Detail</h1><p id="leadMeta"></p></div>
      <div class="btn-group">
        <a href="index.html" class="btn btn-secondary">← Back</a>
        <button class="btn btn-primary" onclick="openModal('editModal')">✏️ Edit Lead</button>
      </div>
    </div>
    <div class="detail-grid">
      <!-- Left: Info -->
      <div>
        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <div class="card-title" style="margin:0">Lead Information</div>
            <div id="statusBadgeEl"></div>
          </div>
          <ul class="info-list" id="infoList"></ul>
        </div>
        <div class="card">
          <div class="card-title">Billing Summary</div>
          <div id="billingSummary"></div>
        </div>
      </div>
      <!-- Right: Tabs -->
      <div>
        <div class="card">
          <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('callTab',this)">📞 Call Logs</button>
            <button class="tab-btn" onclick="switchTab('followTab',this)">📅 Follow-ups</button>
          </div>
          <div class="tab-pane active" id="callTab">
            <button class="btn btn-primary btn-sm" onclick="openModal('callModal')" style="margin-bottom:14px">+ Log Call</button>
            <ul class="timeline" id="callTimeline"><li style="color:var(--text-muted);font-size:0.88rem;padding-left:36px">No call logs yet.</li></ul>
          </div>
          <div class="tab-pane" id="followTab">
            <button class="btn btn-primary btn-sm" onclick="openModal('followModal')" style="margin-bottom:14px">+ Schedule Follow-up</button>
            <ul class="timeline" id="followTimeline"><li style="color:var(--text-muted);font-size:0.88rem;padding-left:36px">No follow-ups yet.</li></ul>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Edit Lead Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal modal-lg">
    <div class="modal-header"><h2>Edit Lead</h2><button class="modal-close" onclick="closeModal('editModal')">×</button></div>
    <form onsubmit="saveEdit(event)">
      <div class="form-grid">
        <div class="form-group"><label>Status</label>
          <select id="eStatus">
            <option>New</option><option>Interested</option><option>Follow-up</option>
            <option>Not Interested</option><option>Converted/Sold</option><option>Callback</option><option>No Response</option>
          </select>
        </div>
        <div class="form-group"><label>Assign To</label><select id="eAssignee"></select></div>
        <div class="form-group"><label>Name</label><input id="eName"></div>
        <div class="form-group"><label>Phone</label><input id="ePhone"></div>
        <div class="form-group"><label>Email</label><input id="eEmail" type="email"></div>
        <div class="form-group"><label>Alt Phone</label><input id="eAltPhone"></div>
        <div class="form-group"><label>City</label><input id="eCity"></div>
        <div class="form-group"><label>Agency</label><input id="eAgency"></div>
        <div class="form-group"><label>Designation</label><input id="eDesignation"></div>
        <div class="form-group full"><label>Remark</label><textarea id="eRemark"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('editModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<!-- Call Log Modal -->
<div class="modal-overlay" id="callModal">
  <div class="modal">
    <div class="modal-header"><h2>Log a Call</h2><button class="modal-close" onclick="closeModal('callModal')">×</button></div>
    <div class="form-grid">
      <div class="form-group"><label>Call Status</label>
        <select id="cStatus">
          <option>Connected</option><option>Not Connected</option><option>Busy</option><option>No Answer</option><option>Callback</option>
        </select>
      </div>
      <div class="form-group"><label>Date & Time</label><input id="cDate" type="datetime-local"></div>
      <div class="form-group full"><label>Notes</label><textarea id="cNotes" placeholder="Call summary, discussion points…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('callModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCallLog()">Save Call Log</button>
    </div>
  </div>
</div>

<!-- Follow-up Modal -->
<div class="modal-overlay" id="followModal">
  <div class="modal">
    <div class="modal-header"><h2>Schedule Follow-up</h2><button class="modal-close" onclick="closeModal('followModal')">×</button></div>
    <div class="form-grid">
      <div class="form-group"><label>Date</label><input id="fDate" type="date"></div>
      <div class="form-group"><label>Time</label><input id="fTime" type="time"></div>
      <div class="form-group full"><label>Note</label><textarea id="fNote" placeholder="What to discuss…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('followModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveFollowUp()">Schedule</button>
    </div>
  </div>
</div>

<script src="../assets/app.js"></script>
<script>
const session = requireAuth();
const params = new URLSearchParams(location.search);
const leadId = params.get('id');
let lead = null;

function load(){
  lead = getLeadById(leadId);
  if(!lead){ showToast('Lead not found','error'); return; }
  document.getElementById('leadName').textContent = lead.name;
  document.getElementById('leadMeta').textContent = `${lead.source} • Added ${fmtDate(lead.createdAt)} • ${lead.city||''}`;
  document.getElementById('statusBadgeEl').innerHTML = statusBadge(lead.status);
  document.getElementById('infoList').innerHTML = [
    ['Phone', lead.phone], ['Email', lead.email||'—'], ['Alt Phone', lead.altPhone||'—'],
    ['City', lead.city||'—'], ['Data City', lead.dataCity||'—'],
    ['Agency', lead.agencyName||'—'], ['Designation', lead.designation||'—'],
    ['Source', lead.source], ['Assignee', lead.assigneeName||'Unassigned'],
    ['Remark', lead.remark||'—']
  ].map(([k,v])=>`<li><span class="info-key">${k}</span><span class="info-val">${v}</span></li>`).join('');

  // Billing summary
  const b = lead.billing || {};
  document.getElementById('billingSummary').innerHTML = b.invoiceNo ? `
    <ul class="info-list">
      <li><span class="info-key">Invoice No</span><span class="info-val">${b.invoiceNo}</span></li>
      <li><span class="info-key">Amount</span><span class="info-val">₹${(b.amount||0).toLocaleString()}</span></li>
      <li><span class="info-key">Status</span><span class="info-val">${payBadge(b.paymentStatus)}</span></li>
      <li><span class="info-key">Paid On</span><span class="info-val">${b.paidOn||'—'}</span></li>
      <li><span class="info-key">Notes</span><span class="info-val">${b.notes||'—'}</span></li>
    </ul>` : '<p style="color:var(--text-muted);font-size:0.88rem">No billing info yet.</p>';

  // Call logs
  const calls = (lead.callLogs||[]).slice().reverse();
  document.getElementById('callTimeline').innerHTML = calls.length ? calls.map(c=>`
    <li class="tl-item">
      <span class="tl-dot ${c.callStatus==='Connected'?'green':c.callStatus==='Callback'?'yellow':c.callStatus==='Not Connected'?'red':'gray'}"></span>
      <div class="tl-content">
        <div class="tl-meta">${fmt(c.date)} • ${c.executive||'—'} • ${callBadge(c.callStatus)}</div>
        <div class="tl-text">${c.notes||'—'}</div>
      </div>
    </li>`).join('') : '<li style="color:var(--text-muted);font-size:0.88rem;padding-left:36px">No call logs yet.</li>';

  // Follow-ups
  const fups = (lead.followUps||[]).slice().reverse();
  document.getElementById('followTimeline').innerHTML = fups.length ? fups.map((f,i)=>`
    <li class="tl-item">
      <span class="tl-dot ${f.completedAt?'green':'yellow'}"></span>
      <div class="tl-content">
        <div class="tl-meta">${f.scheduledDate} ${f.scheduledTime||''} • ${f.completedAt?'✅ Completed':'⏳ Pending'}</div>
        <div class="tl-text">${f.note||'—'}</div>
        ${f.completedAt?`<div class="tl-meta" style="margin-top:4px">Result: ${f.result||'—'}</div>`:`<button class="btn btn-sm btn-success" style="margin-top:8px" onclick="completeFup(${fups.length-1-i})">Mark Complete</button>`}
      </div>
    </li>`).join('') : '<li style="color:var(--text-muted);font-size:0.88rem;padding-left:36px">No follow-ups yet.</li>';

  // Populate edit form
  document.getElementById('eStatus').value = lead.status;
  document.getElementById('eName').value = lead.name;
  document.getElementById('ePhone').value = lead.phone;
  document.getElementById('eEmail').value = lead.email||'';
  document.getElementById('eAltPhone').value = lead.altPhone||'';
  document.getElementById('eCity').value = lead.city||'';
  document.getElementById('eAgency').value = lead.agencyName||'';
  document.getElementById('eDesignation').value = lead.designation||'';
  document.getElementById('eRemark').value = lead.remark||'';
  const execs = getCRMUsers();
  document.getElementById('eAssignee').innerHTML = '<option value="">— Unassigned —</option>' + execs.map(e=>`<option value="${e.email}|${e.name}" ${lead.assigneeEmail===e.email?'selected':''}>${e.name}</option>`).join('');

  // Set default datetime for call log
  document.getElementById('cDate').value = new Date().toISOString().slice(0,16);
}

function switchTab(id, btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function saveEdit(e){
  e.preventDefault();
  const av = document.getElementById('eAssignee').value;
  const [aEmail, aName] = av ? av.split('|') : ['',''];
  lead.status = document.getElementById('eStatus').value;
  lead.name = document.getElementById('eName').value;
  lead.phone = document.getElementById('ePhone').value;
  lead.email = document.getElementById('eEmail').value;
  lead.altPhone = document.getElementById('eAltPhone').value;
  lead.city = document.getElementById('eCity').value;
  lead.agencyName = document.getElementById('eAgency').value;
  lead.designation = document.getElementById('eDesignation').value;
  lead.remark = document.getElementById('eRemark').value;
  lead.assigneeEmail = aEmail; lead.assigneeName = aName; lead.assigned = !!aEmail;
  updateLead(lead); closeModal('editModal'); load();
  showToast('Lead updated successfully','success');
}

function saveCallLog(){
  const cs = document.getElementById('cStatus').value;
  const entry = { date: document.getElementById('cDate').value||now(), callStatus: cs, notes: document.getElementById('cNotes').value.trim(), executive: session?session.name:'' };
  if(!lead.callLogs) lead.callLogs = [];
  lead.callLogs.push(entry);
  // Auto-update status
  const map = { 'Connected':'Interested', 'Callback':'Callback', 'Not Connected':'No Response', 'No Answer':'No Response' };
  if(map[cs]) lead.status = map[cs];
  updateLead(lead); closeModal('callModal'); load();
  showToast('Call logged','success');
}

function saveFollowUp(){
  const d = document.getElementById('fDate').value;
  if(!d){ showToast('Select a date','error'); return; }
  if(!lead.followUps) lead.followUps = [];
  lead.followUps.push({ scheduledDate: d, scheduledTime: document.getElementById('fTime').value, note: document.getElementById('fNote').value.trim(), completedAt: null, result: null });
  lead.status = 'Follow-up';
  updateLead(lead); closeModal('followModal'); load();
  showToast('Follow-up scheduled','success');
}

function completeFup(realIndex){
  const result = prompt('Enter result / outcome:');
  if(result === null) return;
  lead.followUps[realIndex].completedAt = now();
  lead.followUps[realIndex].result = result;
  updateLead(lead); load();
  showToast('Follow-up marked complete','success');
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
load();
</script>
</body>
</html>
