<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Add Lead — TravelCRM</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<nav id="topnav"><button class="hamburger" onclick="toggleSidebar()">☰</button></nav>
<div class="app-layout">
  <nav id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <h1>Add New Lead</h1>
      <p>Manually enter lead information</p>
    </div>
    <div class="card">
      <form id="addLeadForm" onsubmit="saveLead(event)">
        <div style="margin-bottom:20px">
          <div class="card-title">Basic Information</div>
          <div class="form-grid">
            <div class="form-group"><label>Full Name *</label><input id="fName" required placeholder="Lead's full name"></div>
            <div class="form-group"><label>Phone *</label><input id="fPhone" required placeholder="Mobile number"></div>
            <div class="form-group"><label>Email</label><input id="fEmail" type="email" placeholder="Email address"></div>
            <div class="form-group"><label>Alt. Phone</label><input id="fAltPhone" placeholder="Alternate number"></div>
            <div class="form-group"><label>City</label><input id="fCity" placeholder="City"></div>
            <div class="form-group"><label>Data City</label><input id="fDataCity" placeholder="Data source city"></div>
            <div class="form-group"><label>Designation</label><input id="fDesignation" placeholder="Job title / designation"></div>
            <div class="form-group"><label>Agency / Company Name</label><input id="fAgency" placeholder="Agency or company"></div>
          </div>
        </div>
        <div style="margin-bottom:20px">
          <div class="card-title">Lead Configuration</div>
          <div class="form-grid">
            <div class="form-group">
              <label>Source</label>
              <select id="fSource">
                <option value="Meta Ads">Meta Ads</option>
                <option value="Manual">Manual</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="fStatus">
                <option>New</option><option>Interested</option><option>Follow-up</option>
                <option>Not Interested</option><option>Converted/Sold</option><option>Callback</option><option>No Response</option>
              </select>
            </div>
            <div class="form-group">
              <label>Assign To</label>
              <select id="fAssignee">
                <option value="">— Unassigned —</option>
              </select>
            </div>
            <div class="form-group full">
              <label>Remark / Notes</label>
              <textarea id="fRemark" placeholder="Any notes or remarks about this lead…"></textarea>
            </div>
          </div>
        </div>
        <div class="btn-group">
          <a href="index.html" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">💾 Save Lead</button>
        </div>
      </form>
    </div>
  </main>
</div>
<script src="../assets/app.js"></script>
<script>
requireAuth(['admin','crm','tl']);
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

// Populate assignee dropdown
const execs = getCRMUsers();
document.getElementById('fAssignee').innerHTML += execs.map(e=>`<option value="${e.email}|${e.name}">${e.name}</option>`).join('');

function saveLead(e){
  e.preventDefault();
  const assigneeVal = document.getElementById('fAssignee').value;
  const [aEmail, aName] = assigneeVal ? assigneeVal.split('|') : ['',''];
  const lead = {
    id: uid(), createdAt: now(),
    name: document.getElementById('fName').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    altPhone: document.getElementById('fAltPhone').value.trim(),
    city: document.getElementById('fCity').value.trim(),
    dataCity: document.getElementById('fDataCity').value.trim(),
    designation: document.getElementById('fDesignation').value.trim(),
    agencyName: document.getElementById('fAgency').value.trim(),
    source: document.getElementById('fSource').value,
    status: document.getElementById('fStatus').value,
    assigneeEmail: aEmail, assigneeName: aName,
    assigned: !!aEmail, remark: document.getElementById('fRemark').value.trim(),
    callLogs: [], followUps: [], billing: {}
  };
  addLead(lead);
  showToast('Lead added successfully','success');
  setTimeout(()=>window.location.href='index.html', 800);
}
</script>
</body>
</html>
