<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Billing Dashboard — TravelCRM</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<nav id="topnav"><button class="hamburger" onclick="toggleSidebar()">☰</button></nav>
<div class="app-layout">
  <nav id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div><h1>Billing Dashboard</h1><p>Manage invoices and payment status</p></div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="exportBilling()">⬇ Export CSV</button>
        <button class="btn btn-primary" onclick="openInvoiceModal(null)">+ Create Invoice</button>
      </div>
    </div>
    <div class="stats-grid" id="billStats"></div>
    <div class="card">
      <div class="filters-bar">
        <input type="search" id="searchInput" placeholder="🔍 Search lead, invoice…" oninput="renderTable()">
        <select id="filterStatus" onchange="renderTable()">
          <option value="">All Payment Status</option>
          <option>Paid</option><option>Partial</option><option>Pending</option><option>Overdue</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Lead Name</th><th>Agency</th><th>Invoice No</th><th>Amount</th><th>Status</th><th>Paid On</th><th>Notes</th><th>Actions</th></tr></thead>
          <tbody id="billBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Invoice Modal -->
<div class="modal-overlay" id="invoiceModal">
  <div class="modal">
    <div class="modal-header"><h2 id="invoiceModalTitle">Create Invoice</h2><button class="modal-close" onclick="closeModal('invoiceModal')">×</button></div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Select Lead</label>
        <select id="iLead" style="width:100%"></select>
      </div>
      <div class="form-group"><label>Invoice Number</label><input id="iNo" placeholder="INV-001"></div>
      <div class="form-group"><label>Amount (₹)</label><input id="iAmount" type="number" min="0" placeholder="0"></div>
      <div class="form-group"><label>Payment Status</label>
        <select id="iStatus">
          <option>Pending</option><option>Partial</option><option>Paid</option><option>Overdue</option>
        </select>
      </div>
      <div class="form-group"><label>Paid On</label><input id="iPaidOn" type="date"></div>
      <div class="form-group full"><label>Notes</label><textarea id="iNotes" placeholder="Payment notes…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('invoiceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveInvoice()">💾 Save Invoice</button>
    </div>
  </div>
</div>

<script src="../assets/app.js"></script>
<script>
const session = requireAuth(['admin','accounts']);
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
let editingLeadId = null;

function getBilledLeads(){
  return getLeads().filter(l=>l.billing && l.billing.invoiceNo);
}

function renderStats(){
  const leads = getLeads();
  const billed = leads.filter(l=>l.billing&&l.billing.invoiceNo);
  const totalInv = billed.reduce((a,l)=>a+(Number(l.billing.amount)||0),0);
  const totalPaid = billed.filter(l=>l.billing.paymentStatus==='Paid').reduce((a,l)=>a+(Number(l.billing.amount)||0),0);
  const pending = billed.filter(l=>l.billing.paymentStatus==='Pending').length;
  const overdue = billed.filter(l=>l.billing.paymentStatus==='Overdue').length;
  document.getElementById('billStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Invoiced</div><div class="stat-value">₹${totalInv.toLocaleString()}</div></div>
    <div class="stat-card green"><div class="stat-label">Total Paid</div><div class="stat-value">₹${totalPaid.toLocaleString()}</div></div>
    <div class="stat-card yellow"><div class="stat-label">Pending</div><div class="stat-value">${pending}</div></div>
    <div class="stat-card red"><div class="stat-label">Overdue</div><div class="stat-value">${overdue}</div></div>
    <div class="stat-card teal"><div class="stat-label">Invoices</div><div class="stat-value">${billed.length}</div></div>`;
}

function getFilteredBilled(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const st = document.getElementById('filterStatus').value;
  let rows = getLeads().filter(l=>l.billing&&l.billing.invoiceNo);
  if(q) rows = rows.filter(l=>[l.name,l.agencyName,l.billing.invoiceNo].some(v=>v&&v.toLowerCase().includes(q)));
  if(st) rows = rows.filter(l=>l.billing.paymentStatus===st);
  return rows;
}

function renderTable(){
  const rows = getFilteredBilled();
  document.getElementById('billBody').innerHTML = rows.map(l=>`
    <tr>
      <td><a href="../leads/detail.html?id=${l.id}"><b>${l.name}</b></a></td>
      <td class="td-muted">${l.agencyName||'—'}</td>
      <td><code style="background:#f1f5f9;padding:2px 6px;border-radius:4px">${l.billing.invoiceNo}</code></td>
      <td><b>₹${(Number(l.billing.amount)||0).toLocaleString()}</b></td>
      <td>${payBadge(l.billing.paymentStatus)}</td>
      <td class="td-muted">${l.billing.paidOn||'—'}</td>
      <td class="td-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.billing.notes||'—'}</td>
      <td>
        <div class="btn-group">
          <button class="btn btn-sm btn-secondary" onclick="openInvoiceModal('${l.id}')">✏️ Edit</button>
          <button class="btn btn-sm btn-danger" onclick="removeInvoice('${l.id}')">🗑</button>
        </div>
      </td>
    </tr>`).join('') || '<tr><td colspan="8" style="text-align:center;padding:30px" class="td-muted">No invoices found</td></tr>';
}

function openInvoiceModal(leadId){
  editingLeadId = leadId;
  const leads = getLeads();
  document.getElementById('iLead').innerHTML = leads.map(l=>`<option value="${l.id}" ${l.id===leadId?'selected':''}>${l.name} — ${l.phone}</option>`).join('');
  if(leadId){
    const lead = leads.find(l=>l.id===leadId);
    const b = lead&&lead.billing||{};
    document.getElementById('iNo').value=b.invoiceNo||'';
    document.getElementById('iAmount').value=b.amount||'';
    document.getElementById('iStatus').value=b.paymentStatus||'Pending';
    document.getElementById('iPaidOn').value=b.paidOn||'';
    document.getElementById('iNotes').value=b.notes||'';
    document.getElementById('invoiceModalTitle').textContent='Edit Invoice';
  } else {
    document.getElementById('iNo').value='INV-'+String(Date.now()).slice(-4);
    document.getElementById('iAmount').value='';
    document.getElementById('iStatus').value='Pending';
    document.getElementById('iPaidOn').value='';
    document.getElementById('iNotes').value='';
    document.getElementById('invoiceModalTitle').textContent='Create Invoice';
  }
  openModal('invoiceModal');
}

function saveInvoice(){
  const lid = document.getElementById('iLead').value;
  const lead = getLeadById(lid);
  if(!lead) return;
  lead.billing = {
    invoiceNo: document.getElementById('iNo').value.trim(),
    amount: Number(document.getElementById('iAmount').value)||0,
    paymentStatus: document.getElementById('iStatus').value,
    paidOn: document.getElementById('iPaidOn').value,
    notes: document.getElementById('iNotes').value.trim()
  };
  if(lead.billing.paymentStatus==='Paid'||lead.billing.paymentStatus==='Partial') lead.status='Converted/Sold';
  updateLead(lead); closeModal('invoiceModal'); renderStats(); renderTable();
  showToast('Invoice saved','success');
}

function removeInvoice(id){
  if(!confirm('Remove invoice from this lead?')) return;
  const lead = getLeadById(id);
  if(!lead) return;
  lead.billing = {};
  updateLead(lead); renderStats(); renderTable();
  showToast('Invoice removed','success');
}

function exportBilling(){
  const rows = getFilteredBilled();
  exportCSV(rows.map(l=>({Lead:l.name,Agency:l.agencyName,Phone:l.phone,Invoice:l.billing.invoiceNo,Amount:l.billing.amount,Status:l.billing.paymentStatus,PaidOn:l.billing.paidOn,Notes:l.billing.notes})),'billing_export.csv');
}

renderStats(); renderTable();
</script>
</body>
</html>
